faqs:
  - question: What does an interior decor booking include?
    answer: Depending on the partner, this can include consultation, layout planning, styling advice, and coordination for a room or full home refresh.
  - question: Do you handle full renovation or only decor advice?
    answer: Most bookings start with consultation and styling. For construction or painting, you can also book masonry, carpentry, or painting through Panun Kaergar.
  - question: How do I book interior decor with Panun Kaergar?
    answer: Call us, WhatsApp us, fill the booking form on our website, or use the Panun Kaergar app.
  - question: How much does interior decor consultation cost with Panun Kaergar?
    answer: Pricing depends on scope — single room vs full home, and whether you need consultation only or coordination with carpentry/painting. Estimates appear in the app or when you book by phone, WhatsApp, or form.
