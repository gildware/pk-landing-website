  - question: Do you handle both repair and new work?
    answer: Yes. Partners on Panun Kaergar handle patch repairs, tiling, plastering, and small construction jobs depending on availability.
  - question: Are masons on Panun Kaergar verified?
    answer: Partners go through onboarding and are rated by customers after each completed job.
  - question: How much does masonry work cost with Panun Kaergar?
    answer: Pricing depends on the scope — tiling, plastering, or repair. You see estimates in the app before confirming, or our team shares guidance when you book by phone, WhatsApp, or form.
