faqs:
  - question: How do I book a plumber with Panun Kaergar?
    answer: >-
      Call +91 8899 181 555, WhatsApp us, fill the form at panunkaergar.com/book-a-home-service,
      or use the Panun Kaergar app. Share your district, locality, and preferred time — we confirm your booking.
  - question: Can I get same-day plumbing service?
    answer: >-
      Yes, when a partner is available in your area for the selected slot. Leaks and blockages are often
      prioritized when capacity allows.
  - question: Which areas do you cover for plumbing?
    answer: >-
      We serve districts across Kashmir including Srinagar, Budgam, Ganderbal, Baramulla, Anantnag,
      Pulwama, and more. Availability is confirmed by address when you book.
  - question: Are Panun Kaergar plumbers verified?
    answer: Partners on our platform go through onboarding and are rated by customers after each completed job.
  - question: How much does plumbing cost with Panun Kaergar?
    answer: >-
      Pricing depends on the job and parts needed. You see estimates in the app before confirming, or our
      team shares guidance when you book by phone, WhatsApp, or form.
