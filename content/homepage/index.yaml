howItWorksTitle: How to book in 3 simple steps
howItWorksSteps:
  - title: Choose your service
    description: >-
      Pick carpentry, plumbing, masonry, electrician, professional cleaning, pest control,
      laundry, painting, home appliances, gardening, salon, or interior decor. Book on our
      website, call us, WhatsApp us, or use the Panun Kaergar app.
  - title: Pick a time and place
    description: >-
      Share your area in Srinagar and when you want the visit — morning, afternoon, or evening.
      We match you with an available verified provider.
  - title: Get the job done
    description: >-
      The provider comes to your home, completes the work, and you pay as agreed. Rate the
      service in the app and earn loyalty points on app bookings.
whyChooseTitle: Why people choose Panun Kaergar
whyChooseItems:
  - title: Book when it suits you
    description: >-
      Morning, afternoon, or evening — schedule home services across Srinagar at a time
      that works for your family.
  - title: Verified local providers
    description: >-
      Every provider is checked before joining. Customer ratings after each job help keep
      quality high.
  - title: Help in the app
    description: >-
      Use AI chat in the Panun Kaergar app to book faster, track your job, or get tips for
      small fixes at home.
  - title: Save with loyalty points
    description: >-
      Complete bookings in the app to earn points. Use them for discounts on your next
      home service.
platformFeatures:
  - icon: 🤖
    title: App chat support
    description: >-
      Ask questions and book services in the Panun Kaergar app. Get quick help before a
      technician visits.
  - icon: 🏠
    title: All service categories
    description: >-
      Carpentry, plumbing, masonry, electrician, cleaning, pest control, laundry, painting,
      appliances, gardening, men's & women's salon, tank cleaning, and interior decor — all in one place.
  - icon: 🎯
    title: Custom jobs
    description: >-
      Job not listed? Post a custom request in the app. Providers can send you offers so
      you pick the best price.
  - icon: ⭐
    title: Loyalty rewards
    description: >-
      Earn points on completed app bookings. Redeem them for money off your next service.
  - icon: ✅
    title: Trusted providers
    description: >-
      We verify providers before they go live. You can read real customer reviews.
  - icon: 💬
    title: Book without the app
    description: >-
      Call +91 8899 181 555, WhatsApp us, or fill the form on this website. No app required.
