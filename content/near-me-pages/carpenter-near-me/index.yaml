seasonalNotes: >-
  Damp winters can swell wooden doors and windows — stickiness often peaks after wet spells. Dry summer heat can shrink joints. Mention weather-related symptoms when you book so the partner brings the right tools.
coverageNote: >-
  We cover districts across Kashmir including Srinagar, Budgam, Ganderbal, Baramulla, Anantnag, Pulwama, and more. Availability is confirmed by your address when you book. For Srinagar-specific details, see Carpentry in Srinagar.
