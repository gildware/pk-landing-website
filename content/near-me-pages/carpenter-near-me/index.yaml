diyVsPro: >-
  Tighten visible screws, oil a sticky hinge, or temporarily support a loose shelf if it’s safe. Call a carpenter for structural cuts, load-bearing shelves, door frame reshaping, or any work that needs precise fitting. Avoid forcing jammed doors — you can crack the frame.
costFactors:
