faqs:
  - question: How do I book a carpenter near me?
    answer: >-
      Call, WhatsApp, use panunkaergar.com/book-a-home-service, or the Panun Kaergar app. Share your locality and what needs fixing — we match a verified carpenter when available near you.
  - question: What carpentry jobs can I book?
    answer: >-
      Door and window repairs, furniture fixes, wardrobe and cabinet work, installations listed in our catalog, and related wood work. Our team or the app will confirm what fits your job.
  - question: Is same-day carpenter service available?
    answer: >-
      Yes, when a partner is free near your locality. Morning bookings usually have the best chance of a same-day slot.
  - question: Are carpenters verified?
    answer: >-
      Partners complete onboarding and are reviewed by customers after completed jobs.
  - question: How is pricing decided?
    answer: >-
      Cost depends on labour, materials, access, and urgency. You get guidance before confirming — we don’t invent one flat price for every job.
