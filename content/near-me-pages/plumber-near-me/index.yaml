diyVsPro: >-
  Simple checks are fine — close the shutoff valve for a leak, clear hair from a
  visible trap, or note whether the motor’s power light is on. Call a pro for gas
  geyser line work, sewage backups, hidden wall seepage, electrical pumps you’re
  unsure about, or any job where opening walls or main lines is required. If water
  is flooding or you smell sewage, stop DIY and book help.
costFactors:
  - Type of job (tap repair vs pipe replacement vs drain clearing)
  - Parts needed and whether fixtures must be replaced
  - Access difficulty (tight shafts, upper floors, frozen outdoor lines in winter)
  - Time of booking and same-day urgency
  - District and partner availability near your locality
seasonalNotes: >-
  Kashmir winters make outdoor pipes, tanks, and motors more failure-prone. Book
  earlier on cold mornings and after freeze–thaw spells. Summer tourist-season
  weeks in busy Srinagar localities can fill same-day slots faster — morning
  requests have the best chance.
