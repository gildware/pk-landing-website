questionText: What is Panun Kaergar?
answer: >-
  Panun Kaergar is a home services app and website for Srinagar and Kashmir. Book carpenters,
  plumbers, masons, electricians, professional cleaning, pest control, laundry, painters,
  appliance repair, gardening, men's and women's salon, and interior decor. Book by phone,
  WhatsApp, our website form, or the free customer app.
