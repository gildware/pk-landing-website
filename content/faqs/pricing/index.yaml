questionText: How much do home services cost in Srinagar?
answer: >-
  Prices depend on the service type, job size, and parts required. In the Panun Kaergar app you
  see estimates before confirming. When you book by phone, WhatsApp, or our website form, our team
  shares guidance or arranges a visit quote. There are no hidden booking fees on the website.
