question: how-to-book
questionText: How do I book a home service?
answer: >-
  Four easy ways: (1) Fill the booking form on our website or homepage. (2) Call +91 8899 181 555.
  (3) WhatsApp us with your name, service, and area. (4) Download the Panun Kaergar app, choose
  a service and time, and confirm. We assign a verified partner in your area.
