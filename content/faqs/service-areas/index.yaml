questionText: Which areas does Panun Kaergar serve?
answer: >-
  Panun Kaergar serves home services across Kashmir's ten districts: Srinagar, Budgam,
  Ganderbal, Bandipora, Baramulla, Kupwara, Anantnag, Kulgam, Pulwama, and Shopian. Share
  your address when you book by phone, WhatsApp, our website form, or app so we can confirm
  a partner in your zone.
