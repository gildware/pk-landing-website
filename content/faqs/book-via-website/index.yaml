question: book-via-website
questionText: Can I book without downloading the app?
answer: >-
  Yes. Call +91 8899 181 555, WhatsApp us, or fill the booking form on panunkaergar.com/book.
  Tell us your service, area, and preferred time — we confirm by phone or WhatsApp. The app is
  optional for people who want to book and track on their own.
